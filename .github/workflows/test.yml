name: Test Sandbox Login

on:
  workflow_dispatch:
    inputs:
      sandbox_username:
        description: "Username de la sandbox cible"
        required: true
        type: string

jobs:
  login-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Salesforce CLI (binary)
        run: |
          wget https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir -p ~/sf
          tar -xJf sf-linux-x64.tar.xz -C ~/sf --strip-components 1
          echo "$HOME/sf/bin" >> $GITHUB_PATH

      - name: Check CLI
        run: sf version

      - name: Restore JWT key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Authenticate to target sandbox
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ inputs.sandbox_username }}" \
            --instance-url "${{ secrets.SF_SANDBOX_LOGIN_URL }}" \
            --alias targetSandbox

      - name: Show success message
        run: echo "Connexion à la sandbox réussie"

      - name: Display org info
        run: sf org display --target-org targetSandbox
